<!DOCTYPE html>
<html lang="en">
<head>
<script>
(function () {
  var isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" id="themeColorMeta" content="#faf9fb">
<title>Compare Products — Comparely</title>
<meta name="description" content="Search, filter, and compare any two products side by side — price, specs, features, pros &amp; cons, and ratings, with the winner in every category.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%236653F2'/%3E%3Crect x='3' y='4' width='7' height='16' rx='1.5' fill='white'/%3E%3Crect x='14' y='4' width='7' height='16' rx='1.5' fill='white' opacity='0.65'/%3E%3C/svg%3E">
<link rel="stylesheet" href="styles.css">
</head>
<body data-page="compare">

<header class="site-header" id="siteHeader"></header>

<div class="compare-tray" id="compareTray">
  <div class="container tray-inner">
    <div class="tray-slot" id="traySlotA"></div>
    <button class="swap-btn" id="swapBtn" type="button" aria-label="Swap products" title="Swap products">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
    </button>
    <div class="tray-slot" id="traySlotB"></div>
    <button class="btn btn-primary btn-view" id="viewComparisonBtn" type="button">
      <span>Compare</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
  </div>
</div>

<main>
  <section class="page-header">
    <div class="container">
      <h1>Compare products</h1>
      <p>Search or filter below, pick two products, and see exactly where each one wins.</p>

      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search products or brands…" aria-label="Search products" autocomplete="off">
      </div>

      <div class="filter-row">
        <div class="category-pills" id="categoryPills"></div>
        <div class="sort-box">
          <label for="sortSelect" class="sr-only">Sort products</label>
          <select id="sortSelect">
            <option value="featured">Featured</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
            <option value="rating-desc">Rating: High to Low</option>
            <option value="name-asc">Name: A–Z</option>
          </select>
        </div>
      </div>
    </div>
  </section>

  <section class="product-section container">
    <div class="section-heading">
      <h2>All products</h2>
      <span class="results-count" id="resultsCount"></span>
    </div>
    <div class="product-grid" id="productGrid"></div>
    <p class="no-results" id="noResults" hidden>No products match your search. Try a different term or filter.</p>
    <div class="show-more-wrap">
      <button class="btn-showmore" id="showMoreBtn" type="button" hidden></button>
    </div>
  </section>

  <section class="comparison-section" id="comparisonSection" hidden>
    <div class="container">
      <div class="section-heading">
        <h2>Detailed comparison</h2>
      </div>

      <div class="comparison-panels" id="comparisonPanels"></div>
      <p class="overall-line" id="overallLine"></p>
      <div class="score-strip" id="scoreStrip"></div>
      <div class="comparison-blocks" id="comparisonBlocks"></div>
    </div>
  </section>
</main>

<footer class="site-footer" id="siteFooter"></footer>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script src="products.js"></script>
<script src="common.js"></script>
<script src="compare.js"></script>
</body>
</html>
